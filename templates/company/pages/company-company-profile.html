{% extends "company/company_base.html" %}
 {% load static %}
 {% block content %}
        <div>
          <button class="mobile-menu-toggle" type="button" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="d-inline ms-3 mb-0 fs-4 fw-bold">Update Company Profile</h1>
        </div>
        <div class="user-profile">
          <div class="text-end">
            <strong>Tech Corp</strong><br>
            <small class="text-muted">IT Services</small>
          </div>
          <div class="user-avatar">TC</div>
        </div>
      </div>

      <div class="container-fluid py-4">
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0"><i class="fas fa-building me-2"></i>Update Company Profile</h5>
          </div>
          <div class="card-body">
            <form id="companyProfileForm">
              <div class="form-section">
                <h6 class="form-section-title"><i class="fas fa-building"></i> Company Details</h6>

                <div class="form-group-floating filled input-with-icon">
                  <i class="fas fa-building input-icon" aria-hidden="true"></i>
                  <input type="text" class="form-control" id="companyName" name="companyName"
                         value="Tech Corp" placeholder=" " required>
                  <label class="form-floating-label" for="companyName">
                    Company Name <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="form-group-floating filled input-with-icon">
                  <i class="fas fa-user-tie input-icon" aria-hidden="true"></i>
                  <input type="text" class="form-control" id="hrName" name="hrName"
                         value="Sarah Johnson" placeholder=" " required>
                  <label class="form-floating-label" for="hrName">
                    HR Name <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group-floating filled input-with-icon">
                      <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
                      <input type="email" class="form-control" id="companyEmail" name="email"
                             value="hr@techcorp.com" placeholder=" " required>
                      <label class="form-floating-label" for="companyEmail">
                        Email <span class="text-danger">*</span>
                      </label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group-floating filled input-with-icon">
                      <i class="fas fa-phone input-icon" aria-hidden="true"></i>
                      <input type="tel" class="form-control" id="companyPhone" name="phone"
                             value="+91 80 1234 5678" placeholder=" " required>
                      <label class="form-floating-label" for="companyPhone">
                        Phone <span class="text-danger">*</span>
                      </label>
                    </div>
                  </div>
                </div>

                <div class="form-group-floating filled input-with-icon">
                  <i class="fas fa-globe input-icon" aria-hidden="true"></i>
                  <input type="url" class="form-control" id="companyWebsite" name="website"
                         value="https://www.techcorp.com" placeholder=" ">
                  <label class="form-floating-label" for="companyWebsite">Website</label>
                </div>

                <div class="form-group-floating filled input-with-icon">
                  <i class="fas fa-align-left input-icon" aria-hidden="true"></i>
                  <textarea class="form-control" id="companyDesc" name="description" rows="4"
                            placeholder=" ">Tech Corp is a leading IT services company specializing in software development, cloud solutions, and digital transformation. We have been serving clients globally for over 15 years.</textarea>
                  <label class="form-floating-label" for="companyDesc">Description</label>
                </div>
              </div>

              <button type="submit" class="btn btn-success btn-hover-ripple">
                <i class="fas fa-save me-2"></i>Save Changes
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  {% endblock content %}
