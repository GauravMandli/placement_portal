{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    {% block title %}Company Dashboard - Placement Portal{% endblock title %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

     <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
     


    <style>
        .dashboard-page {
            display: none;
        }

        .dashboard-page.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="sidebar-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
        
        <!-- #its a call side bar page -->
        {% include "company/includes/company_sidebar.html" %}

        <!-- Main Content -->
        <main class="main-content">
             <!-- #its a call topbar page -->
            {% include "company/includes/company_topbar.html" %}
            

             <!-- body content mate -->
            {% block content %}
            {% endblock content %}


    <!-- #its a call model for  -->
            {% include "company/includes/company_models.html" %}

        </main>
    </div>
   

    



      



</body>

</html>
